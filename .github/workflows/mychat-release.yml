name: Release MyChat

# 打 mychat-v* 前缀 tag 时，自动打包 plugin/chat/MyChat 并发布到 GitHub Release。
#
# 说明：
# - 本仓库是 monorepo，插件在 plugin/chat/MyChat 深层子目录。BigWigsMods/packager
#   要求“仓库根即插件根”，不支持深层子目录，故改用本仓库自带的 package.sh
#   （专为该子目录设计、已验证）打包，再用 softprops/action-gh-release 上传。
# - 前缀 tag 用于区分不同插件的发布，避免与 manager 的 v* tag 冲突。
# - 插件实际版本以 MyChat.toc 的 ## Version 为准（package.sh 会校验其与 Constants.lua 一致）。
# - CurseForge / WoWInterface / Wago 的自动上传后续可各自接官方 action，见 RELEASING.md。

on:
  push:
    tags:
      - "mychat-v*"
  workflow_dispatch: {}

permissions:
  contents: write   # 创建 GitHub Release 需要写权限

jobs:
  release:
    name: 打包并发布 MyChat
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 打包（校验版本一致 + .toc 引用齐全，产出到 plugin/dist）
        run: |
          chmod +x plugin/chat/package.sh
          plugin/chat/package.sh --output "${GITHUB_WORKSPACE}/plugin/dist"
          ls -la "${GITHUB_WORKSPACE}/plugin/dist"

      - name: 上传打包产物（artifact）
        uses: actions/upload-artifact@v4
        with:
          name: mychat-package
          if-no-files-found: error
          path: plugin/dist/*.zip

      - name: 创建 GitHub Release 并附 zip
        if: startsWith(github.ref, 'refs/tags/mychat-v')
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/dist/*.zip
          generate_release_notes: true
