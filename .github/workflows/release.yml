name: Release

# 打 tag（v*）时在 macOS 与 Windows 上分别打包并上传产物。
# 工作流只作薄触发层，打包命令收敛在 Makefile 的 bundle 目标。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: manager/wow-addon-manager
    shell: bash

jobs:
  bundle:
    name: 打包 ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact: macos-bundle
          - os: windows-latest
            label: Windows
            artifact: windows-bundle
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            manager/wow-addon-manager/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('manager/wow-addon-manager/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: manager/wow-addon-manager/pnpm-lock.yaml

      - name: 确保 make 可用（Windows）
        if: runner.os == 'Windows'
        run: |
          if ! command -v make >/dev/null 2>&1; then
            choco install make --no-progress -y
          fi

      - name: 打包（make bundle）
        run: make bundle

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            manager/wow-addon-manager/src-tauri/target/release/bundle/dmg/*.dmg
            manager/wow-addon-manager/src-tauri/target/release/bundle/macos/*.app
            manager/wow-addon-manager/src-tauri/target/release/bundle/msi/*.msi
            manager/wow-addon-manager/src-tauri/target/release/bundle/nsis/*.exe

  publish:
    name: 汇总产物到 Release
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 GitHub Release 并附产物
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
